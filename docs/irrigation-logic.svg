<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" rx="16" fill="#0f1923"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">🧠 Smart Irrigation Decision Logic</text>
  <text x="400" y="62" text-anchor="middle" fill="#64748b" font-size="11">Every 15 minutes, for each zone — FAO-56 checkbook method</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 1: CONTINUOUS MONITORING -->
  <!-- ═══════════════════════════════════════ -->
  <text x="32" y="95" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">CONTINUOUS (EVERY 15 MIN)</text>

  <!-- Checkbook update box -->
  <rect x="200" y="108" width="400" height="52" rx="8" fill="#1e293b" stroke="#334155" filter="url(#shadow)"/>
  <text x="400" y="128" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">📊 Update Soil Water Balance</text>
  <text x="400" y="146" text-anchor="middle" fill="#94a3b8" font-size="10">balance = yesterday − ET₀×Kc + rain + irrigation</text>

  <!-- Arrow down -->
  <line x1="400" y1="160" x2="400" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ARM check -->
  <rect x="230" y="188" width="340" height="44" rx="22" fill="#1e293b" stroke="#f59e0b44" stroke-width="1.5"/>
  <text x="400" y="207" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">Moisture ≤ MAD + 14% ?</text>
  <text x="400" y="222" text-anchor="middle" fill="#94a3b8" font-size="9">MAD shifts with temperature: +3% per 10°F above 70°F</text>

  <!-- YES: ARM -->
  <line x1="400" y1="232" x2="400" y2="255" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="415" y="248" fill="#22c55e" font-size="9" font-weight="600">YES</text>

  <rect x="310" y="258" width="180" height="30" rx="6" fill="#22c55e18" stroke="#22c55e55"/>
  <text x="400" y="278" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">🔔 ARM sprinkler</text>

  <!-- NO: keep monitoring -->
  <text x="578" y="215" fill="#64748b" font-size="9">NO → keep monitoring</text>
  <line x1="570" y1="210" x2="620" y2="210" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PRE-EMPTIVE CHECK -->
  <line x1="400" y1="288" x2="400" y2="308" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="311" width="400" height="40" rx="20" fill="#1e293b" stroke="#fb923c44" stroke-width="1.5"/>
  <text x="400" y="328" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">🌡️ Tomorrow &gt; 82°F &amp; moisture &lt; MAD+14 ?</text>
  <text x="400" y="343" text-anchor="middle" fill="#94a3b8" font-size="9">Pre-emptive arm: build buffer before heat</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- PHASE 2: 4-6 AM DECISION WINDOW -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="400" y1="351" x2="400" y2="385" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="32" y="380" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">4:00 – 6:00 AM WINDOW</text>

  <rect x="160" y="388" width="480" height="36" rx="8" fill="#22c55e12" stroke="#22c55e44"/>
  <text x="400" y="411" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">Armed? → Run decision checks ↓</text>

  <!-- CHECK 1: WIND -->
  <line x1="400" y1="424" x2="400" y2="450" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="453" width="320" height="40" rx="20" fill="#1e293b" stroke="#94a3b855" stroke-width="1.5"/>
  <text x="400" y="470" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">💨 Check 1: Wind &gt; 10 mph ?</text>
  <text x="400" y="485" text-anchor="middle" fill="#94a3b8" font-size="9">Sprinkler drift wastes 30-50% of water</text>

  <!-- YES: SKIP WIND -->
  <line x1="560" y1="473" x2="660" y2="473" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="466" fill="#22c55e" font-size="9" font-weight="600">YES</text>
  <rect x="663" y="458" width="120" height="30" rx="6" fill="#94a3b815" stroke="#94a3b844"/>
  <text x="723" y="478" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">💨 SKIP</text>
  <text x="723" y="500" text-anchor="middle" fill="#64748b" font-size="8">Stay armed, try tomorrow</text>

  <!-- NO: continue -->
  <line x1="400" y1="493" x2="400" y2="520" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="512" fill="#64748b" font-size="9">NO</text>

  <!-- CHECK 2: RAIN -->
  <rect x="220" y="523" width="360" height="40" rx="20" fill="#1e293b" stroke="#3b82f644" stroke-width="1.5"/>
  <text x="400" y="540" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">🌧️ Check 2: Rain forecast today/tomorrow ?</text>
  <text x="400" y="555" text-anchor="middle" fill="#94a3b8" font-size="9">Uses Open-Meteo forecast + precipitation probability</text>

  <!-- YES + enough moisture: SKIP RAIN -->
  <line x1="560" y1="543" x2="660" y2="543" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="536" fill="#22c55e" font-size="9" font-weight="600">YES</text>
  <rect x="663" y="525" width="120" height="46" rx="6" fill="#3b82f615" stroke="#3b82f644"/>
  <text x="723" y="543" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">🌧️ SKIP</text>
  <text x="723" y="557" text-anchor="middle" fill="#64748b" font-size="8">if moisture &gt; MAD−3%</text>
  <text x="723" y="567" text-anchor="middle" fill="#a78bfa" font-size="8">⚠️ WATER if too dry</text>

  <!-- NO: continue -->
  <line x1="400" y1="563" x2="400" y2="590" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="582" fill="#64748b" font-size="9">NO</text>

  <!-- CHECK 3: STRESS TARGET -->
  <rect x="210" y="593" width="380" height="40" rx="20" fill="#1e293b" stroke="#f59e0b44" stroke-width="1.5"/>
  <text x="400" y="610" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">🌱 Check 3: Stress target met? (&gt; 1 hr)</text>
  <text x="400" y="625" text-anchor="middle" fill="#94a3b8" font-size="9">Intentional deficit irrigation for root development</text>

  <!-- NO: SKIP STRESS -->
  <line x1="560" y1="613" x2="660" y2="613" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="596" y="606" fill="#ef4444" font-size="9" font-weight="600">&lt; 1 hr</text>
  <rect x="663" y="598" width="120" height="30" rx="6" fill="#f59e0b15" stroke="#f59e0b44"/>
  <text x="723" y="618" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">🌱 DELAY</text>
  <text x="723" y="638" text-anchor="middle" fill="#64748b" font-size="8">Let roots reach deeper</text>

  <!-- YES: continue to water -->
  <line x1="400" y1="633" x2="400" y2="660" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="415" y="652" fill="#22c55e" font-size="9" font-weight="600">≥ 1 hr</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- WATER DECISION -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="230" y="663" width="340" height="56" rx="10" fill="#22c55e20" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="685" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">💧 WATER</text>
  <text x="400" y="703" text-anchor="middle" fill="#94a3b8" font-size="10">Runtime = (target − current) ÷ precip rate</text>
  <text x="400" y="715" text-anchor="middle" fill="#64748b" font-size="9">Target adapts: MAD+15 base + 0.08%/°F above 65°F</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- EMERGENCY OVERRIDE -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="400" y1="719" x2="400" y2="745" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="32" y="760" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">EMERGENCY OVERRIDE (ANY HOUR)</text>

  <rect x="200" y="770" width="400" height="44" rx="8" fill="#ef444418" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="790" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">🚨 Moisture ≤ Wilt Point + 2% ?</text>
  <text x="400" y="806" text-anchor="middle" fill="#94a3b8" font-size="9">Bypasses time window — prevents permanent damage</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- DATA SOURCES -->
  <!-- ═══════════════════════════════════════ -->
  <text x="32" y="845" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.5">DATA SOURCES</text>

  <rect x="32" y="855" width="160" height="50" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="112" y="875" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">🌐 Open-Meteo</text>
  <text x="112" y="892" text-anchor="middle" fill="#64748b" font-size="8">ET₀, temp, wind, rain</text>
  <text x="112" y="902" text-anchor="middle" fill="#64748b" font-size="8">forecast, humidity</text>

  <rect x="210" y="855" width="160" height="50" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="290" y="875" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">📐 Zone Config</text>
  <text x="290" y="892" text-anchor="middle" fill="#64748b" font-size="8">Precip rate, Kc, root</text>
  <text x="290" y="902" text-anchor="middle" fill="#64748b" font-size="8">depth, soil type</text>

  <rect x="388" y="855" width="160" height="50" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="468" y="875" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">📊 Soil Balance</text>
  <text x="468" y="892" text-anchor="middle" fill="#64748b" font-size="8">Running checkbook</text>
  <text x="468" y="902" text-anchor="middle" fill="#64748b" font-size="8">updated every 5 min</text>

  <rect x="566" y="855" width="160" height="50" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="646" y="875" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">🌱 Plant Science</text>
  <text x="646" y="892" text-anchor="middle" fill="#64748b" font-size="8">FAO-56, MAD, stress</text>
  <text x="646" y="902" text-anchor="middle" fill="#64748b" font-size="8">thresholds, Kc curves</text>
</svg>