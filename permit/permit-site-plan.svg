<svg xmlns="http://www.w3.org/2000/svg" width="850" height="1200" viewBox="0 0 850 1200">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .title { font-size: 18px; font-weight: bold; }
    .subtitle { font-size: 12px; }
    .label { font-size: 12px; font-weight: bold; }
    .detail { font-size: 10px; }
    .note { font-size: 9px; fill: #555; }
    .lot-line { stroke: #333; stroke-width: 2.5; fill: none; }
    .house { fill: #e2e8f0; stroke: #475569; stroke-width: 2; }
    .street { fill: #d1d5db; stroke: #6b7280; stroke-width: 1; }
    .pipe-new { stroke: #16a34a; stroke-width: 3.5; fill: none; }
    .pipe-existing { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 6,3; }
    .marker { font-size: 11px; font-weight: bold; }
  </style>

  <!-- Border -->
  <rect x="10" y="10" width="830" height="1180" fill="white" stroke="#333" stroke-width="2" rx="4"/>

  <!-- Title Block -->
  <rect x="20" y="20" width="810" height="70" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="425" y="45" text-anchor="middle" class="title">SITE PLAN — IRRIGATION WATER TAP &amp; MAIN LINE ROUTE</text>
  <text x="425" y="62" text-anchor="middle" class="subtitle">Pace Residence, Duvall, WA 98019  |  Plumbing Permit  |  May 2026</text>
  <text x="425" y="78" text-anchor="middle" class="subtitle" fill="#dc2626">NOT TO SCALE — approximate layout for permit reference</text>

  <!-- ========== STREET ========== -->
  <rect x="100" y="130" width="650" height="50" class="street"/>
  <text x="425" y="160" text-anchor="middle" class="label" fill="#374151">STREET (FRONT / NORTH)</text>

  <!-- Sidewalk -->
  <rect x="100" y="180" width="650" height="20" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="425" y="194" text-anchor="middle" class="detail" fill="#6b7280">Sidewalk</text>

  <!-- ========== LOT BOUNDARY ========== -->
  <rect x="100" y="200" width="650" height="880" class="lot-line" fill="#f0fdf4" fill-opacity="0.3"/>
  <text x="60" y="640" text-anchor="middle" class="label" transform="rotate(-90, 60, 640)">PROPERTY LINE (WEST)</text>
  <text x="790" y="640" text-anchor="middle" class="label" transform="rotate(90, 790, 640)">PROPERTY LINE (EAST)</text>
  <text x="425" y="1092" text-anchor="middle" class="label">PROPERTY LINE (REAR / SOUTH)</text>

  <!-- ========== NORTH ARROW ========== -->
  <g transform="translate(780, 140)">
    <polygon points="0,-25 -8,5 0,-5 8,5" fill="#333"/>
    <text x="0" y="18" text-anchor="middle" class="label">N</text>
  </g>

  <!-- ================================================================ -->
  <!--                    WATER METER (NW corner)                       -->
  <!-- ================================================================ -->
  <rect x="115" y="200" width="50" height="35" fill="#bfdbfe" stroke="#1e40af" stroke-width="2" rx="3"/>
  <text x="140" y="222" text-anchor="middle" class="marker" fill="#1e40af">M</text>
  <text x="200" y="213" class="label" fill="#1e40af">WATER METER</text>
  <text x="200" y="226" class="detail" fill="#1e40af">(existing, NW corner)</text>

  <!-- City supply from main to meter -->
  <line x1="140" y1="180" x2="140" y2="200" class="pipe-existing"/>

  <!-- ================================================================ -->
  <!--            PIPE FROM METER DOWN TO TEE                           -->
  <!-- ================================================================ -->
  <line x1="140" y1="235" x2="140" y2="300" class="pipe-existing"/>

  <!-- ================================================================ -->
  <!--                    NEW TEE (the split point)                     -->
  <!-- ================================================================ -->
  <circle cx="140" cy="310" r="14" fill="#dcfce7" stroke="#166534" stroke-width="2.5"/>
  <text x="140" y="315" text-anchor="middle" class="marker" fill="#166534" style="font-size:16px">T</text>
  <text x="140" y="345" text-anchor="middle" class="label" fill="#166534">NEW TEE</text>
  <text x="140" y="358" text-anchor="middle" class="detail" fill="#166534">(splice into existing line)</text>

  <!-- ================================================================ -->
  <!--   RIGHT BRANCH: existing water to house (dashed, no change)      -->
  <!-- ================================================================ -->
  <line x1="154" y1="310" x2="350" y2="310" class="pipe-existing"/>
  <line x1="350" y1="310" x2="350" y2="520" class="pipe-existing"/>
  <text x="260" y="300" text-anchor="middle" class="detail" fill="#6b7280">existing water to house →</text>

  <!-- ================================================================ -->
  <!--   DOWN BRANCH: new irrigation (green, this permit)               -->
  <!-- ================================================================ -->
  <line x1="140" y1="324" x2="140" y2="390" class="pipe-new"/>

  <!-- Ball Valve -->
  <rect x="118" y="390" width="44" height="28" fill="#bbf7d0" stroke="#166534" stroke-width="2" rx="3"/>
  <text x="140" y="408" text-anchor="middle" class="marker" fill="#166534" style="font-size:9px">VALVE</text>
  <text x="195" y="400" class="label" fill="#166534" style="font-size:11px">BALL VALVE</text>
  <text x="195" y="413" class="detail" fill="#166534">manual shutoff</text>

  <!-- Pipe from ball valve to DCVA -->
  <line x1="140" y1="418" x2="140" y2="445" class="pipe-new"/>

  <!-- DCVA -->
  <rect x="110" y="445" width="60" height="35" fill="#bbf7d0" stroke="#166534" stroke-width="2.5" rx="3"/>
  <text x="140" y="467" text-anchor="middle" class="marker" fill="#166534">DCVA</text>
  <text x="195" y="458" class="label" fill="#166534" style="font-size:11px">BACKFLOW PREVENTER</text>
  <text x="195" y="471" class="detail" fill="#166534">in underground valve box</text>

  <!-- Pipe from DCVA down along west side -->
  <line x1="140" y1="480" x2="140" y2="830" class="pipe-new"/>

  <!-- Label the main line -->
  <text x="175" y="680" text-anchor="middle" class="label" fill="#16a34a" transform="rotate(-90, 175, 680)">1" POLY MAIN LINE (BURIED)</text>

  <!-- Turn east across backyard to valve boxes -->
  <line x1="140" y1="830" x2="550" y2="830" class="pipe-new"/>

  <!-- ================================================================ -->
  <!--                         HOUSE                                    -->
  <!-- ================================================================ -->
  <rect x="250" y="520" width="350" height="240" class="house" rx="4"/>
  <text x="425" y="645" text-anchor="middle" class="label" style="font-size:18px" fill="#475569">HOUSE</text>

  <!-- ================================================================ -->
  <!--               VALVE BOX 1 (4 valves)                             -->
  <!-- ================================================================ -->
  <line x1="350" y1="830" x2="350" y2="870" class="pipe-new"/>
  <rect x="310" y="870" width="80" height="45" fill="#bbf7d0" stroke="#166534" stroke-width="2.5" rx="4"/>
  <text x="350" y="890" text-anchor="middle" class="marker" fill="#166534">VB1</text>
  <text x="350" y="905" text-anchor="middle" class="detail" fill="#166534" style="font-size:9px">4 VALVES</text>
  <text x="350" y="932" text-anchor="middle" class="label" fill="#166534" style="font-size:10px">VALVE BOX 1</text>
  <text x="350" y="945" text-anchor="middle" class="detail" fill="#166534">4 zones, underground</text>

  <!-- Zone branches from VB1 -->
  <line x1="320" y1="915" x2="250" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="340" y1="915" x2="300" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="360" y1="915" x2="400" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="380" y1="915" x2="450" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ================================================================ -->
  <!--               VALVE BOX 2 (5 valves)                             -->
  <!-- ================================================================ -->
  <line x1="550" y1="830" x2="550" y2="870" class="pipe-new"/>
  <rect x="510" y="870" width="80" height="45" fill="#bbf7d0" stroke="#166534" stroke-width="2.5" rx="4"/>
  <text x="550" y="890" text-anchor="middle" class="marker" fill="#166534">VB2</text>
  <text x="550" y="905" text-anchor="middle" class="detail" fill="#166534" style="font-size:9px">5 VALVES</text>
  <text x="550" y="932" text-anchor="middle" class="label" fill="#166534" style="font-size:10px">VALVE BOX 2</text>
  <text x="550" y="945" text-anchor="middle" class="detail" fill="#166534">5 zones, underground</text>

  <!-- Zone branches from VB2 -->
  <line x1="520" y1="915" x2="470" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="535" y1="915" x2="520" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="550" y1="915" x2="570" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="565" y1="915" x2="620" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="580" y1="915" x2="670" y2="960" class="pipe-new" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ================================================================ -->
  <!--                    ZONE AREAS                                    -->
  <!-- ================================================================ -->
  <!-- Front yard zones -->
  <rect x="400" y="250" width="320" height="200" fill="#86efac" fill-opacity="0.15" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3" rx="4"/>
  <text x="560" y="350" text-anchor="middle" class="detail" fill="#16a34a">FRONT YARD ZONES</text>
  <text x="560" y="365" text-anchor="middle" class="detail" fill="#16a34a">(A &amp; B)</text>

  <!-- Backyard zones -->
  <rect x="110" y="960" width="380" height="100" fill="#86efac" fill-opacity="0.15" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3" rx="4"/>
  <text x="300" y="1015" text-anchor="middle" class="label" fill="#16a34a">BACKYARD ZONES</text>

  <!-- Side zones -->
  <rect x="560" y="960" width="180" height="100" fill="#86efac" fill-opacity="0.15" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3" rx="4"/>
  <text x="650" y="1015" text-anchor="middle" class="detail" fill="#16a34a">SIDE ZONES</text>

  <!-- ================================================================ -->
  <!--                       LEGEND                                     -->
  <!-- ================================================================ -->
  <rect x="20" y="1100" width="810" height="80" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="35" y="1120" class="label">LEGEND:</text>

  <line x1="35" y1="1140" x2="75" y2="1140" class="pipe-existing"/>
  <text x="80" y="1144" class="detail">Existing water line (no change)</text>

  <line x1="250" y1="1140" x2="290" y2="1140" class="pipe-new"/>
  <text x="295" y="1144" class="detail">New irrigation line (this permit)</text>

  <rect x="470" y="1132" width="20" height="14" fill="#bbf7d0" stroke="#166534" stroke-width="2" rx="2"/>
  <text x="495" y="1144" class="detail">New component (this permit)</text>

  <rect x="660" y="1132" width="20" height="14" fill="#bfdbfe" stroke="#1e40af" stroke-width="2" rx="2"/>
  <text x="685" y="1144" class="detail">Existing component</text>

  <text x="35" y="1168" class="detail" font-weight="bold">M</text>
  <text x="50" y="1168" class="detail">= Water Meter</text>
  <text x="150" y="1168" class="detail" font-weight="bold">T</text>
  <text x="160" y="1168" class="detail">= New Tee</text>
  <text x="240" y="1168" class="detail" font-weight="bold">DCVA</text>
  <text x="272" y="1168" class="detail">= Backflow Preventer</text>
  <text x="410" y="1168" class="detail" font-weight="bold">VB1/VB2</text>
  <text x="455" y="1168" class="detail">= Valve Boxes (4 + 5 = 9 zones)</text>
</svg>