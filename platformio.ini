[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

; I2C scan — verify MCP23017 expansion board is detected.
; Flash: pio run -e i2c-scan --target upload --upload-port COM5
; Monitor: pio device monitor --baud 115200 --port COM5
[env:i2c-scan]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<main.cpp> +<../test/i2c_scan.cpp>

; Power test — bare-minimum firmware to verify buck converter can boot ESP32.
; No WiFi, no GPIO, no sensors. Just serial heartbeat + chip temp.
; Flash: pio run -e power-test --target upload --upload-port COM3
; Monitor: pio device monitor --baud 115200
[env:power-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DPOWER_TEST_ONLY
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

; OTA environment — use after first USB flash:
;   pio run -e ota --target upload
[env:ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = 192.168.0.150
upload_flags =
    --timeout=60
    --auth=
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
