{# Shared mobile bottom nav. Include near the end of <body>. #}
<style>
.sg-mobilenav, .sg-sheet, .sg-sheet-backdrop { display: none; }
@media (max-width: 768px) {
  .sg-mobilenav {
    display: block; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1003;
    background: #fff; border-top: 1px solid #e5e7eb;
    box-shadow: 0 -2px 10px rgba(0,0,0,.06);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .sg-mobilenav-inner { display: grid; grid-template-columns: repeat(5, 1fr); }
  .sg-nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 7px 2px 6px; font-size: .68rem; line-height: 1;
    color: #6b7280; text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
  }
  .sg-nav-item .sg-ic {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 7px;
    font-size: .72rem; line-height: 1; font-weight: 800;
    background: #f1f5f9; color: #475569;
  }
  .sg-nav-item.active { color: #16a34a; font-weight: 700; }
  .sg-nav-item.active .sg-ic { background: #dcfce7; color: #15803d; }

  .sg-sheet-backdrop {
    display: block; position: fixed; inset: 0; z-index: 1001;
    background: rgba(0,0,0,.4); opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
  }
  .sg-sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sg-sheet {
    display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 1002;
    background: #fff; border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.18);
    transform: translateY(100%); transition: transform .25s ease;
    padding: 8px 12px calc(16px + env(safe-area-inset-bottom, 0));
    max-height: 75vh; overflow-y: auto;
  }
  .sg-sheet.open { transform: translateY(0); }
  .sg-sheet-handle {
    width: 40px; height: 4px; border-radius: 2px; background: #d1d5db;
    margin: 8px auto 12px;
  }
  .sg-sheet-title {
    font-size: .8rem; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: .04em; margin: 0 4px 8px;
  }
  .sg-sheet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .sg-sheet-item {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 12px 4px; border-radius: 10px; text-decoration: none;
    color: #374151; font-size: .72rem; text-align: center; line-height: 1.15;
    background: none; border: none; cursor: pointer; font-family: inherit;
  }
  .sg-sheet-item:active { background: #f3f4f6; }
  .sg-sheet-item .sg-ic {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 8px;
    font-size: .72rem; font-weight: 800;
    background: #f1f5f9; color: #475569;
  }
  .sg-sheet-item.active { color: #16a34a; font-weight: 700; }
  .sg-sheet-item.active .sg-ic { background: #dcfce7; color: #15803d; }

  body { padding-bottom: calc(64px + env(safe-area-inset-bottom, 0)); }
}
</style>

<nav class="sg-mobilenav" aria-label="Primary navigation">
  <div class="sg-mobilenav-inner">
    <a href="/#home" class="sg-nav-item" data-panel="home"><span class="sg-ic">H</span>Home</a>
    <a href="/#zones" class="sg-nav-item" data-panel="zones"><span class="sg-ic">Z</span>Zones</a>
    <a href="/moisture-sim" class="sg-nav-item"><span class="sg-ic">S</span>Schedule</a>
    <a href="/water-usage" class="sg-nav-item"><span class="sg-ic">W</span>Water</a>
    <button type="button" class="sg-nav-item" id="sgMoreBtn" aria-controls="sgSheet" aria-expanded="false"><span class="sg-ic">+</span>More</button>
  </div>
</nav>

<div class="sg-sheet-backdrop" id="sgSheetBackdrop"></div>
<div class="sg-sheet" id="sgSheet" role="dialog" aria-label="More navigation">
  <div class="sg-sheet-handle"></div>
  <div class="sg-sheet-title">More</div>
  <div class="sg-sheet-grid">
    <a href="/#history" class="sg-sheet-item" data-panel="history"><span class="sg-ic">R</span>History</a>
    <a href="/sensor-history" class="sg-sheet-item"><span class="sg-ic">T</span>Sensors</a>
    <a href="/#cam" class="sg-sheet-item" data-panel="cam"><span class="sg-ic">MC</span>Meter Camera</a>
    <a href="/#deer" class="sg-sheet-item" data-panel="deer"><span class="sg-ic">D</span>Deer</a>
    <a href="/#settings" class="sg-sheet-item" data-panel="settings"><span class="sg-ic">*</span>Settings</a>
    <a href="/forecast" class="sg-sheet-item"><span class="sg-ic">F</span>Forecast</a>
    <a href="/costs" class="sg-sheet-item"><span class="sg-ic">$</span>Cost</a>
    <a href="/flow" class="sg-sheet-item"><span class="sg-ic">G</span>Flow</a>
    <a href="/calibrate" class="sg-sheet-item"><span class="sg-ic">C</span>Calibrate</a>
    <a href="/cam" class="sg-sheet-item"><span class="sg-ic">MT</span>Meter Tools</a>
    <a href="/cam/archive" class="sg-sheet-item"><span class="sg-ic">AR</span>Meter Archive</a>
    <a href="/map" class="sg-sheet-item"><span class="sg-ic">MP</span>Map</a>
  </div>
</div>

<script>
(function() {
  var sheet = document.getElementById('sgSheet');
  var backdrop = document.getElementById('sgSheetBackdrop');
  var moreBtn = document.getElementById('sgMoreBtn');
  function openSheet()  { if (sheet && backdrop) { sheet.classList.add('open'); backdrop.classList.add('open'); sheet.removeAttribute('inert'); sheet.setAttribute('aria-hidden','false'); moreBtn.setAttribute('aria-expanded','true'); var a=sheet.querySelector('a,button'); if(a)a.focus(); } }
  function closeSheet(restore) { if (sheet && backdrop) { sheet.classList.remove('open'); backdrop.classList.remove('open'); sheet.setAttribute('inert',''); sheet.setAttribute('aria-hidden','true'); moreBtn.setAttribute('aria-expanded','false'); if(restore)moreBtn.focus(); } }
  if(sheet){sheet.setAttribute('inert','');sheet.setAttribute('aria-hidden','true');}
  if (moreBtn) moreBtn.addEventListener('click', function(e){ e.preventDefault(); sheet.classList.contains('open')?closeSheet(true):openSheet(); });
  if (backdrop) backdrop.addEventListener('click', closeSheet);
  document.addEventListener('keydown', function(e){if(e.key==='Escape'&&sheet&&sheet.classList.contains('open'))closeSheet(true);});

  document.querySelectorAll('.sg-nav-item[data-panel], .sg-sheet-item[data-panel]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      var panel = el.dataset.panel;
      if (window.location.pathname === '/' && typeof window.showPanel === 'function') {
        e.preventDefault();
        try { history.replaceState(null, '', '/#' + panel); } catch(_) {}
        window.showPanel(panel);
        closeSheet();
      }
    });
  });

  (function highlight() {
    var path = window.location.pathname;
    var hash = (window.location.hash || '').replace('#', '');
    document.querySelectorAll('.sg-nav-item, .sg-sheet-item').forEach(function(el) {
      var href = el.getAttribute('href') || '';
      var isPanel = el.dataset.panel;
      var on = false;
      if (path === '/' && isPanel) {
        on = (hash === isPanel) || (!hash && isPanel === 'home');
      } else if (!isPanel && href === path) {
        on = true;
      }
      el.classList.toggle('active', on);
      if(on) el.setAttribute('aria-current','page'); else el.removeAttribute('aria-current');
    });
  })();
  fetch('/api/dashboard').then(function(r){if(!r.ok)throw new Error();return r.json();}).then(function(d){
    var dot=document.getElementById('sb-dot'), label=document.getElementById('sb-status');
    if(dot)dot.className='status-dot '+(d.esp32_online?'online':'offline');
    if(label)label.textContent=d.esp32_online?'ESP32 online':'ESP32 offline';
  }).catch(function(){var label=document.getElementById('sb-status');if(label)label.textContent='Status unavailable';});
})();
</script>
