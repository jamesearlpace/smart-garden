<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast — Smart Garden</title>
<style>
:root {
  /* Light theme — matches dashboard (index.html) */
  --bg: #f5f7f9; --card: #ffffff; --bg-card: #ffffff;
  --border: #e8ecf0; --border-light: #f0f2f5;
  --text: #1a2b3c; --text2: #5f7082; --text3: #9ba8b5;
  --green: #15803d; --green-dark: #166534; --green-light: #dcfce7; --green-bg: rgba(34,197,94,.08);
  --blue: #3b82f6; --blue-light: #dbeafe; --blue-bg: rgba(59,130,246,.08);
  --amber: #92400e; --amber-light: #fef3c7; --amber-bg: rgba(245,158,11,.08);
  --red: #ef4444; --red-light: #fee2e2; --red-bg: rgba(239,68,68,.08);
  --purple: #a855f7;
  --bg-sidebar: #1b2e1f; --bg-sidebar-hover: rgba(255,255,255,.08);
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
       background: var(--bg); color: var(--text); line-height: 1.55; min-height: 100vh; }

/* ── Sidebar (cloned from dashboard) ── */
.sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh; background: var(--bg-sidebar);
  color: #fff; display: flex; flex-direction: column; z-index: 100; }
.sidebar-brand { padding: 24px 20px 20px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.08) }
.sidebar-brand .logo { font-size: 1.8rem }
.sidebar-brand .name { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em }
.sidebar-brand .loc { font-size: .7rem; color: rgba(255,255,255,.5); margin-top: 1px }
.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto }
.sidebar .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px;
  cursor: pointer; transition: all .2s; color: rgba(255,255,255,.6); font-size: .88rem; font-weight: 500; margin-bottom: 2px;
  text-decoration: none; }
.sidebar .nav-item:hover { background: var(--bg-sidebar-hover); color: rgba(255,255,255,.85) }
.sidebar .nav-item.active { background: rgba(34,197,94,.18); color: #4ade80; font-weight: 600 }
.sidebar .nav-item .icon { font-size: 1.15rem; width: 24px; text-align: center }
.nav-section{padding:14px 14px 6px;font-size:.62rem;font-weight:800;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.08em}
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08); font-size: .72rem; color: rgba(255,255,255,.35) }
.sidebar-footer .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px }
.sidebar-footer .status-dot.online { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,.5) }
.sidebar-footer .status-dot.offline { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,.5) }

/* ── Main content offset ── */
.main { margin-left: var(--sidebar-w); min-height: 100vh; padding: 24px 32px 80px; max-width: 980px; }

h1 { font-size: 1.4rem; margin-bottom: 4px; }
.sub { color: var(--text2); font-size: .85rem; margin-bottom: 16px; }
.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px;
        border: 1px solid var(--border); box-shadow: var(--shadow); }
.card h2 { font-size: 1rem; margin-bottom: 8px; }
a { color: var(--blue); text-decoration: none; }
.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.tab { padding: 10px 20px; font-size: .9rem; font-weight: 600; cursor: pointer; border: 0; background: transparent; border-bottom: 2px solid transparent;
       margin-bottom: -2px; color: var(--text2); transition: color .2s, border-color .2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--green); border-bottom-color: var(--green); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Forecast tab styles */
.weather { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
.stat { text-align: center; }
.stat .val { font-size: 1.3rem; font-weight: 700; }
.stat .lbl { font-size: .7rem; color: var(--text2); }
.zone { display: flex; justify-content: space-between; align-items: center; padding: 10px 0;
        border-bottom: 1px solid var(--border); }
.zone:last-child { border-bottom: none; }
.zone-name { font-weight: 600; font-size: .95rem; }
.zone-detail { font-size: .8rem; color: var(--text2); }
.zone-forecast { text-align: right; }
.dry-row { margin-top: 5px; }
.dry-btn { font-size: .72rem; padding: 3px 9px; border: 1px solid var(--border);
           border-radius: 6px; background: var(--card); color: #b45309; cursor: pointer;
           font-weight: 600; }
.dry-btn:hover { background: #fff7ed; border-color: #fdba74; }
.dry-btn:disabled { opacity: .7; cursor: default; }
.dry-badge { font-size: .68rem; color: #b45309; background: #fff7ed; border: 1px solid #fed7aa;
             border-radius: 6px; padding: 2px 6px; margin-left: 4px; }
.dry-badge a { color: var(--text2); margin-left: 4px; }
.days { font-size: 1.2rem; font-weight: 700; }
.days.soon { color: var(--amber); }
.days.now { color: var(--red); }
.days.ok { color: var(--green); }
.next-date { font-size: .75rem; color: var(--text2); }
.bar-wrap { height: 6px; background: var(--border-light); border-radius: 3px; margin-top: 4px; width: 120px; }
.bar { height: 100%; border-radius: 3px; }

/* Forecast vs Actual tab styles */
.accuracy-banner { display: flex; gap: 16px; flex-wrap: wrap; }
.acc-stat { flex: 1; min-width: 100px; text-align: center; padding: 12px; background: var(--border-light); border-radius: 8px; }
.acc-stat .aval { font-size: 1.6rem; font-weight: 700; }
.acc-stat .albl { font-size: .7rem; color: var(--text2); margin-top: 2px; }
.acc-good { color: var(--green); }
.acc-warn { color: var(--amber); }
.acc-bad { color: var(--red); }
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.controls select, .controls button { background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; min-height: 44px; font-size: .85rem; cursor: pointer; }
.control { display: grid; gap: 2px; font-size: .72rem; color: var(--text2); }
.skip-link { position: fixed; left: 12px; top: -60px; z-index: 1000; background: #fff; color: #111827; padding: 10px 14px; border: 2px solid #166534; border-radius: 6px; }
.skip-link:focus { top: 12px; }
.comparison-note { font-size: .85rem; color: var(--text2); margin-bottom: 12px; }
.sr-status { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
.day-group { margin-bottom: 16px; }
.day-header { font-size: .85rem; font-weight: 600; color: var(--text2); margin-bottom: 8px;
              padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.event-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-light); align-items: flex-start; }
.event-row:last-child { border-bottom: none; }
.zone-col { width: 140px; flex-shrink: 0; }
.zone-col .name { font-weight: 600; font-size: .9rem; }
.forecast-col, .actual-col { flex: 1; min-width: 0; }
.forecast-col .detail, .actual-col .detail { overflow-wrap: anywhere; }
.col-header { font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); margin-bottom: 4px; }
.forecast-col .detail { color: var(--purple); font-size: .85rem; }
.actual-col .detail { font-size: .85rem; }
.outcome-col { width: 90px; flex-shrink: 0; text-align: center; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: .75rem; font-weight: 600; }
.badge-correct_water, .badge-correct_skip { background: rgba(34,197,94,.15); color: var(--green); }
.badge-false_skip { background: rgba(239,68,68,.15); color: var(--red); }
.badge-missed_skip { background: rgba(245,158,11,.15); color: var(--amber); }
.badge-early_water { background: rgba(59,130,246,.15); color: #3b82f6; }
.badge-no_event, .badge-other { background: rgba(148,163,184,.1); color: var(--text2); }
.empty { text-align: center; padding: 40px; color: var(--text2); }
.empty .icon { font-size: 2rem; margin-bottom: 8px; }
.seed-btn { margin-top: 12px; padding: 8px 20px; background: var(--blue); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; }

/* Mobile bottom nav */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
              border-top: 1px solid var(--border); box-shadow: 0 -2px 8px rgba(0,0,0,.05); z-index: 200; padding: 4px 0; }
.mobile-nav-inner { display: flex; justify-content: space-around; }
.mob-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 8px;
                font-size: .65rem; color: var(--text2); text-decoration: none; cursor: pointer; }
.mob-nav-item.active { color: var(--green-dark); }
.mob-nav-item .mob-icon { font-size: 1.2rem; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px 16px 80px; }
  .mobile-nav { display: block; }
  body { padding-bottom: 80px; }
  .event-row { flex-direction: column; gap: 6px; }
  .zone-col { width: auto; }
  .outcome-col { width: auto; text-align: left; }
  .accuracy-banner { flex-direction: column; }
}
@media (max-width: 260px) {
  .main { padding: 8px 8px 80px; min-width: 0; }
  .tabs { flex-direction: column; align-items: stretch; }
  .tab { width: 100%; min-width: 0; padding-inline: 8px; text-align: left; }
  .controls, .control, .controls select, .controls button { width: 100%; min-width: 0; max-width: 100%; }
  .accuracy-banner { min-width: 0; max-width: 100%; }
  .acc-stat { flex-basis: auto; width: 100%; min-width: 0; max-width: 100%; padding-inline: 4px; overflow-wrap: anywhere; }
  .acc-stat .aval { font-size: 1.2rem; }
  .zone { align-items: flex-start; flex-direction: column; }
  .zone-forecast { max-width: 100%; min-width: 0; text-align: left; overflow-wrap: anywhere; }
  .bar-wrap { max-width: 100%; }
  .event-row, .forecast-col, .actual-col { min-width: 0; max-width: 100%; }
  .mobile-nav-inner { justify-content: flex-start; overflow-x: auto; max-width: 100%; }
  .mob-nav-item { flex: 0 0 44px; min-width: 0; padding-inline: 2px; overflow-wrap: anywhere; }
}
</style>

<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

{% include '_appsidebar.html' %}
<main class="main" id="main-content">

<h1>🌧️ Forecast</h1>
<div class="sub">Watering predictions and accuracy tracking</div>

<div class="tabs" role="tablist" aria-label="Forecast views">
  <button type="button" class="tab active" id="forecast-tab" role="tab" tabindex="0" aria-selected="true" aria-controls="tab-forecast" data-tab="forecast">Forecast</button>
  <button type="button" class="tab" id="comparison-tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="tab-comparison" data-tab="comparison">Forecast vs Actual</button>
</div>

<!-- ═══ TAB 1: Forecast ═══ -->
<div class="tab-panel active" id="tab-forecast" role="tabpanel" aria-labelledby="forecast-tab">
  <div id="forecast-content" aria-busy="true"><div class="loading" role="status" aria-live="polite">Loading forecast...</div></div>
</div>

<!-- ═══ TAB 2: Forecast vs Actual ═══ -->
<div class="tab-panel" id="tab-comparison" role="tabpanel" aria-labelledby="comparison-tab">
  <div class="controls">
    <label class="control" for="dayRange">Date range<select id="dayRange">
      <option value="7">Last 7 days</option>
      <option value="14">Last 14 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="90">Last 90 days</option>
    </select></label>
    <label class="control" for="zoneFilter">Zone<select id="zoneFilter">
      <option value="all">All zones</option>
    </select></label>
    <label class="control" for="outcomeFilter">Outcome<select id="outcomeFilter">
      <option value="all">All outcomes</option>
      <option value="correct_water">✅ Correct water</option>
      <option value="correct_skip">✅ Correct skip</option>
      <option value="false_skip">❌ False skip</option>
      <option value="missed_skip">⚠️ Missed skip</option>
      <option value="early_water">🌊 Early water</option>
    </select></label>
  </div>
  <p class="comparison-note" id="comparison-explanation">Accuracy includes only completed, scored automatic-mode decisions. Manual zones and incomplete decisions are excluded.</p>
  <div id="comparison-status" class="sr-status" role="status" aria-live="polite"></div>
  <div id="comparison-content" aria-describedby="comparison-explanation" aria-busy="false"><div class="loading" role="status">Loading...</div></div>
</div>

</main><!-- /.main -->

{% include '_mobilenav.html' %}

<script>
/* ═══ Sidebar status poller — keeps the ESP32 status dot live ═══ */
function refreshSidebarStatus() {
  fetch('/api/health').then(function(r) { return r.json(); }).then(function(d) {
    var online = !!d.esp32_reachable;
    var dot = document.getElementById('sb-dot');
    var lbl = document.getElementById('sb-status');
    if (dot) dot.className = 'status-dot ' + (online ? 'online' : 'offline');
    if (lbl) lbl.textContent = online ? 'ESP32 Online' : 'ESP32 Offline';
  }).catch(function() {
    var dot = document.getElementById('sb-dot');
    var lbl = document.getElementById('sb-status');
    if (dot) dot.className = 'status-dot offline';
    if (lbl) lbl.textContent = 'Connection Error';
  });
}
refreshSidebarStatus();
setInterval(refreshSidebarStatus, 30000);

/* ═══ Tab switching ═══ */
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab-panel#tab-' + id).classList.add('active');
  // Activate the clicked tab
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function(tab) {
    const selected = tab.dataset.tab === id;
    tab.classList.toggle('active', selected);
    tab.setAttribute('aria-selected', selected ? 'true' : 'false');
    tab.tabIndex = selected ? 0 : -1;
  });
  localStorage.setItem('sg-forecast-tab', id);
  if (id === 'comparison' && !compLoaded) loadComparison();
}

/* ═══ TAB 1: Forecast ═══ */
let forecastController = null;
let forecastSequence = 0;
async function loadForecast() {
  const sequence = ++forecastSequence;
  if (forecastController) forecastController.abort();
  forecastController = new AbortController();
  const controller = forecastController;
  const box = document.getElementById('forecast-content');
  box.setAttribute('aria-busy', 'true');
  box.innerHTML = '<div class="card" role="status" aria-live="polite">Updating forecast\u2026</div>';
  const timer = setTimeout(function() { controller.abort(); }, 15000);
  try {
    const responses = await Promise.all([
      fetch('/api/forecast', {signal: controller.signal, headers:{'X-Requested-With':'XMLHttpRequest'}}),
      fetch('/api/schedule-7day', {signal: controller.signal, headers:{'X-Requested-With':'XMLHttpRequest'}})
    ]);
    const r = responses[0], sr = responses[1];
    if (r.status === 401) { window.location.href = '/login'; return; }
    if (!r.ok) throw new Error('Forecast service returned HTTP ' + r.status + '.');
    if (!sr.ok) throw new Error('Schedule service returned HTTP ' + sr.status + '.');
    const d = await r.json();
    const schedule = await sr.json();
    if (!d || typeof d !== 'object' || !d.weather || !Array.isArray(d.zones)) throw new Error('Forecast data has an invalid format.');
    if (!schedule || typeof schedule !== 'object' || !schedule.next_water) throw new Error('Schedule data has an invalid format.');
    if (sequence !== forecastSequence) return;
    renderForecast(d, schedule);
  } catch(e) {
    if (sequence !== forecastSequence) return;
    const message = e && e.name === 'AbortError' ? 'Forecast request timed out.' : (e.message || 'Forecast is unavailable.');
    box.innerHTML = '<div class="card" role="alert">' + esc(message) + ' <button type="button" id="forecast-retry">Retry</button></div>';
    document.getElementById('forecast-retry').addEventListener('click', loadForecast);
  } finally {
    clearTimeout(timer);
    if (sequence === forecastSequence) {
      forecastController = null;
      box.setAttribute('aria-busy', 'false');
    }
  }
}

function renderForecast(d, schedule) {
  let html = '';
  const w = d.weather || {};
  html += '<div class="card"><h2>Current Conditions</h2><div class="weather">';
  html += fstat(w.temp_f ? w.temp_f.toFixed(0) + '°F' : '?', 'Temperature');
  html += fstat(w.humidity != null ? Math.round(w.humidity) + '%' : '?', 'Humidity');
  html += fstat(d.et0_today ? d.et0_today.toFixed(1) + 'mm' : '?', 'ET₀ Today');
  html += fstat(w.precip_mm != null ? w.precip_mm.toFixed(1) + 'mm' : '0mm', 'Rain Forecast');
  html += fstat(w.wind_mph ? w.wind_mph.toFixed(0) + 'mph' : '?', 'Wind');
  html += '</div></div>';

  html += '<div class="card"><h2>Zone Forecast</h2>';
  html += '<div style="font-size:.78rem;color:var(--text2);margin:-4px 0 8px">See a zone that looks dry in real life? Tap <b>\uD83C\uDF35 Looks dry</b> — it waters that zone sooner and teaches the model it runs drier than predicted (fades over ~2 weeks unless you tap again).</div>';
  if (!d.zones || d.zones.length === 0) {
    html += '<div style="color:var(--text2);padding:12px">No zone data available</div>';
  } else {
    d.zones.forEach(z => {
      const zoneId = Number(z.id);
      if (!Number.isInteger(zoneId)) return;
      const authoritative = schedule.next_water[String(zoneId)] || null;
      const days = authoritative ? Number(authoritative.days_away) : null;
      let daysText, daysClass;
      // Manual-mode zones are never auto-watered by the engine — don't show a
      // predicted day (the balance can sit below MAD indefinitely on purpose).
      const isManual = z.auto_mode === false;
      if (isManual) { daysText = 'Manual'; daysClass = 'ok'; }
      else if (days === null || days === undefined) { daysText = '?'; daysClass = 'ok'; }
      else if (days < 1) { daysText = 'Today'; daysClass = 'now'; }
      else if (days <= 2) { daysText = days.toFixed(0) + 'd'; daysClass = 'soon'; }
      else { daysText = days.toFixed(0) + 'd'; daysClass = 'ok'; }
      const rawPct = Number(z.balance_pct);
      const pct = Number.isFinite(rawPct) ? Math.max(0, Math.min(100, rawPct)) : null;
      const barColor = pct === null ? 'var(--text2)' : pct > 60 ? 'var(--green)' : pct > 30 ? 'var(--amber)' : 'var(--red)';
      html += '<div class="zone"><div>';
      html += '<div class="zone-name">' + esc(String(z.name || 'Unnamed zone')) + '</div>';
      html += '<div class="zone-detail">' + (z.type === 'drip' ? '💧 Drip' : '🌱 Sprinkler') +
              ' · ET: ' + (z.etc_mm ? z.etc_mm.toFixed(1) : '?') + 'mm/day</div>';
      html += '<div class="bar-wrap"><div class="bar" style="width:' + (pct === null ? 0 : pct) + '%;background:' + barColor + '"></div></div>';
      html += '</div><div class="zone-forecast">';
      html += '<div class="days ' + daysClass + '">' + daysText + '</div>';
      html += (!isManual && authoritative && authoritative.date_label) ? '<div class="next-date">' + esc(authoritative.date_label) + '</div>' : '';
      if (!isManual) {
        const bias = z.dry_bias_mm || 0;
        html += '<div class="dry-row">';
        html += '<button class="dry-btn" data-zone-id="' + zoneId + '">\uD83C\uDF35 Looks dry</button>';
        if (bias > 0) html += '<span class="dry-badge" title="learned dryness — fades over ~2 weeks">running dry −' + bias.toFixed(1) + 'mm<a href="#" class="dry-reset" data-zone-id="' + zoneId + '">reset</a></span>';
        html += '</div>';
      }
      html += '</div></div>';
    });
  }
  html += '</div>';
  html += '<div class="card" style="font-size:.85rem;color:var(--text2)">⏰ Watering window: ' +
          safeTime(d.window_start, '04:00') + ' – ' + safeTime(d.window_end, '07:00') + '</div>';
  document.getElementById('forecast-content').innerHTML = html;
  document.querySelectorAll('.dry-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { looksDry(Number(btn.dataset.zoneId), btn); });
  });
  document.querySelectorAll('.dry-reset').forEach(function(link) {
    link.addEventListener('click', function(ev) { resetDry(Number(link.dataset.zoneId), ev); });
  });
}

function fstat(val, label) {
  return '<div class="stat"><div class="val">' + val + '</div><div class="lbl">' + label + '</div></div>';
}

async function looksDry(zoneId, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '…';
  try {
    const r = await fetch('/api/zone/' + zoneId + '/looks-dry', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = d.sooner_days ? ('✓ ~' + d.sooner_days + 'd sooner') : '✓ noted';
      setTimeout(loadForecast, 1300);
    } else {
      btn.textContent = orig; btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = orig; btn.disabled = false;
  }
}

async function resetDry(zoneId, ev) {
  ev.preventDefault();
  try { await fetch('/api/zone/' + zoneId + '/dryness-reset', { method: 'POST' }); } catch (e) {}
  loadForecast();
}

/* ═══ TAB 2: Forecast vs Actual ═══ */
let rawData = null;
let compLoaded = false;

async function loadComparison() {
  const days = document.getElementById('dayRange').value;
  const box = document.getElementById('comparison-content');
  box.setAttribute('aria-busy','true');
  box.innerHTML = '<div class="card" role="status" aria-live="polite">Updating comparison…</div>';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 60000);
  try {
    const r = await fetch('/api/forecast-vs-actual?days=' + days, {signal:controller.signal, headers:{'X-Requested-With':'XMLHttpRequest'}});
    if (r.status === 401) throw new Error('Your session expired. Sign in again, then retry this view.');
    if (!r.ok) throw new Error('Comparison service returned HTTP ' + r.status + '.');
    rawData = normalizeComparison(await r.json());
    compLoaded = true;
    populateZoneFilter(rawData.comparisons.filter(c => c.scored));
    applyFilter();
  } catch(e) {
    compLoaded = false;
    const msg = e.name === 'AbortError' ? 'The comparison request timed out.' : e.message;
    box.innerHTML = '<div class="card" role="alert">' + esc(msg) + ' <button type="button" onclick="loadComparison()">Retry</button></div>';
  } finally {
    clearTimeout(timer);
    box.setAttribute('aria-busy','false');
  }
}

function safeTime(value, fallback) {
  return /^([01]\d|2[0-3]):[0-5]\d$/.test(value || '') ? esc(value) : fallback;
}

function normalizeComparison(payload) {
  if(!payload || !Array.isArray(payload.comparisons)) throw new Error('Comparison data was malformed.');
  const rows = payload.comparisons.filter(function(c){
    return c && typeof c === 'object' && Number.isInteger(Number(c.zone_id)) &&
      typeof c.zone_name === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(c.forecast_date||'');
  }).map(function(c){
    c.zone_id=Number(c.zone_id); c.scored=!!c.scored;
    const outcomes=['correct_water','correct_skip','false_skip','missed_skip','early_water','no_event','other'];
    c.outcome=outcomes.indexOf(c.outcome)>=0?c.outcome:'other';
    return c;
  });
  const invalidCount=payload.comparisons.length-rows.length;
  if(invalidCount) throw new Error('Comparison data contained '+invalidCount+' invalid row'+(invalidCount===1?'':'s')+'.');
  return {comparisons:rows, invalid_count:0};
}

function accuracyFrom(rows){
  const a={total:rows.length,total_waterings:0,total_skips:0,false_skips:0,missed_skips:0,early_waters:0};
  let correct=0;
  rows.forEach(function(c){
    if(c.actually_watered)a.total_waterings++; else a.total_skips++;
    if(c.outcome==='correct_water'||c.outcome==='correct_skip')correct++;
    if(c.outcome==='false_skip')a.false_skips++;
    if(c.outcome==='missed_skip')a.missed_skips++;
    if(c.outcome==='early_water')a.early_waters++;
  });
  a.accuracy_pct=a.total?Math.round(correct/a.total*1000)/10:null;
  return a;
}

function populateZoneFilter(comparisons) {
  const sel = document.getElementById('zoneFilter');
  const current = sel.value;
  const zones = new Map();
  comparisons.forEach(c => { if (!zones.has(c.zone_id)) zones.set(c.zone_id, c.zone_name); });
  sel.replaceChildren();
  const allOption = document.createElement('option');
  allOption.value = 'all'; allOption.textContent = 'All zones'; sel.appendChild(allOption);
  zones.forEach((name, id) => {
    const option = document.createElement('option');
    option.value = String(id); option.textContent = name; sel.appendChild(option);
  });
  sel.value = current;
}

function applyFilter() {
  if (!rawData) return;
  const zoneVal = document.getElementById('zoneFilter').value;
  const outcomeVal = document.getElementById('outcomeFilter').value;
  let filtered = rawData.comparisons.filter(c => c.scored);
  if (zoneVal !== 'all') filtered = filtered.filter(c => c.zone_id == zoneVal);
  if (outcomeVal !== 'all') filtered = filtered.filter(c => c.outcome === outcomeVal);
  renderComparison(accuracyFrom(filtered), filtered);
  document.getElementById('comparison-status').textContent = filtered.length + ' scored predictions shown.';
}

function renderComparison(accuracy, comparisons) {
  let html = '';
  if (accuracy && accuracy.total > 0) {
    const accPct = accuracy.accuracy_pct;
    const accClass = accPct >= 80 ? 'acc-good' : accPct >= 60 ? 'acc-warn' : 'acc-bad';
    html += '<div class="card"><h2>Accuracy Summary</h2><div class="accuracy-banner">';
    html += accStat(accPct !== null ? accPct + '%' : '—', 'Accuracy', accClass);
    html += accStat(accuracy.total, 'Predictions', '');
    html += accStat(accuracy.total_waterings, 'Waterings', 'acc-good');
    html += accStat(accuracy.total_skips, 'No-water predictions', '');
    html += accStat(accuracy.false_skips, 'False Skips', accuracy.false_skips > 0 ? 'acc-bad' : '');
    html += accStat(accuracy.missed_skips, 'Missed Skips', accuracy.missed_skips > 0 ? 'acc-warn' : '');
    if (accuracy.early_waters !== undefined)
      html += accStat(accuracy.early_waters, 'Early Waters', accuracy.early_waters > 0 ? 'acc-warn' : '');
    html += '</div></div>';
  }
  if (!comparisons || comparisons.length === 0) {
    html += '<div class="card empty" role="status" aria-live="polite"><div class="icon">📊</div><div>No forecast data yet.</div>';
    const hasRows = rawData && rawData.comparisons.length;
    html += '<div style="color:var(--text2);font-size:.85rem;margin-top:8px">' +
      (hasRows ? 'No scored rows match these filters.' : 'Forecasts are captured daily at 3:55 AM.') + '</div>';
    if(!hasRows) html += '<button class="seed-btn" onclick="seedSnapshot()">Take Snapshot Now</button>';
    html += '</div>';
    document.getElementById('comparison-content').innerHTML = html;
    return;
  }
  const byDate = {};
  comparisons.forEach(c => { if (!byDate[c.forecast_date]) byDate[c.forecast_date] = []; byDate[c.forecast_date].push(c); });
  const dates = Object.keys(byDate).sort().reverse();
  html += '<div class="timeline">';
  dates.forEach(d => {
    html += '<section class="day-group"><h2 class="day-header">' + formatDate(d) + '</h2>';
    byDate[d].forEach(c => { html += renderRow(c); });
    html += '</section>';
  });
  html += '</div>';
  document.getElementById('comparison-content').innerHTML = html;
}

function renderRow(c) {
  let html = '<div class="event-row">';
  html += '<div class="zone-col"><div class="name">' + esc(c.zone_name) + '</div></div>';
  html += '<div class="forecast-col"><div class="col-header">Predicted</div><div class="detail">';
  if (c.predicted_skip) html += '⏭️ Skip' + (c.predicted_skip_reason ? ' (' + esc(c.predicted_skip_reason) + ')' : '');
  else if (c.predicted_days !== null) {
    if (c.predicted_days <= 0) html += '💧 Water today';
    else { html += '⏳ ' + c.predicted_days.toFixed(0) + 'd until water';
           if (c.predicted_date) html += ' (' + formatDate(c.predicted_date) + ')'; }
  } else html += '— No ET demand';
  html += '</div><div style="font-size:.75rem;color:var(--text2)">Balance: ' +
          (c.balance_mm !== null ? c.balance_mm.toFixed(1) : '?') + '/' +
          (c.taw_mm !== null ? c.taw_mm.toFixed(1) : '?') + 'mm · ETc: ' +
          (c.etc_mm !== null ? c.etc_mm.toFixed(1) : '?') + 'mm' +
          (c.rain_forecast_mm > 0 ? ' · Rain fcst: ' + c.rain_forecast_mm.toFixed(1) + 'mm' : '') + '</div></div>';
  html += '<div class="actual-col"><div class="col-header">Actual</div><div class="detail">';
  if (c.actually_watered) {
    const dur = c.actual_duration_sec
      ? (c.actual_duration_sec < 60 ? c.actual_duration_sec + ' sec' : (c.actual_duration_sec / 60).toFixed(0) + ' min')
      : '?';
    const gal = c.actual_gallons ? c.actual_gallons.toFixed(1) : null;
    html += '💧 Watered ' + dur; if (gal) html += ' (' + gal + ' gal)';
    if (c.actual_trigger) html += ' — ' + esc(c.actual_trigger);
  } else if (c.actually_skipped) {
    html += '⏭️ Skipped: ' + esc(c.actual_skip_reason || 'unknown');
    if (c.actual_gallons_saved) html += ' (saved ' + c.actual_gallons_saved.toFixed(1) + ' gal)';
  } else html += '<span style="color:var(--text2)">No watering or skip event</span>';
  html += '</div>';
  if (c.actually_watered && c.actual_soil_before !== null)
    html += '<div style="font-size:.75rem;color:var(--text2)">Soil: ' +
            (c.actual_soil_before !== null ? c.actual_soil_before + '%' : '?') + ' → ' +
            (c.actual_soil_after !== null ? c.actual_soil_after + '%' : '?') + '</div>';
  html += '</div>';
  html += '<div class="outcome-col"><span class="badge badge-' + c.outcome + '">' + outcomeLabel(c.outcome) + '</span></div>';
  html += '</div>';
  return html;
}

function outcomeLabel(o) {
  return { correct_water:'✅ Correct', correct_skip:'✅ Correct', false_skip:'❌ False Skip',
           missed_skip:'⚠️ Missed', early_water:'🌊 Early', no_event:'— None', other:'? Other' }[o] || o;
}

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() { switchTab(tab.dataset.tab); });
  tab.addEventListener('keydown', function(e) {
    var tabs=Array.from(document.querySelectorAll('.tab')), i=tabs.indexOf(tab), next=null;
    if(e.key==='ArrowRight') next=(i+1)%tabs.length;
    else if(e.key==='ArrowLeft') next=(i-1+tabs.length)%tabs.length;
    else if(e.key==='Home') next=0;
    else if(e.key==='End') next=tabs.length-1;
    if(next!==null){e.preventDefault();switchTab(tabs[next].dataset.tab);tabs[next].focus();}
  });
});
document.getElementById('dayRange').addEventListener('change', loadComparison);
document.getElementById('zoneFilter').addEventListener('change', applyFilter);
document.getElementById('outcomeFilter').addEventListener('change', applyFilter);
function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
function esc(s) { if (!s) return ''; const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }
function accStat(val, label, cls) {
  return '<div class="acc-stat"><div class="aval ' + (cls||'') + '">' + val + '</div><div class="albl">' + label + '</div></div>';
}

async function seedSnapshot() {
  const btn = document.querySelector('.seed-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try {
    const r = await fetch('/api/forecast-snapshot', { method: 'POST' });
    const d = await r.json();
    if (d.ok) { btn.textContent = '✅ Saved'; setTimeout(loadComparison, 1000); }
    else { btn.textContent = 'Error: ' + (d.error||'unknown'); setTimeout(() => { btn.textContent = 'Take Snapshot Now'; btn.disabled = false; }, 3000); }
  } catch(e) { btn.textContent = 'Error'; setTimeout(() => { btn.textContent = 'Take Snapshot Now'; btn.disabled = false; }, 3000); }
}

/* ═══ Init ═══ */
loadForecast();
setInterval(loadForecast, 300000);
// Restore last tab
const savedTab = localStorage.getItem('sg-forecast-tab');
if (savedTab === 'comparison') switchTab('comparison');
</script>
