<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast vs Actual — Smart Garden</title>
<style>
:root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0;
        --text2: #94a3b8; --green: #22c55e; --blue: #3b82f6; --amber: #f59e0b;
        --red: #ef4444; --purple: #a855f7; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); padding: 16px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.4rem; margin-bottom: 4px; }
.sub { color: var(--text2); font-size: .85rem; margin-bottom: 16px; }
.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px;
        border: 1px solid var(--border); }
.card h2 { font-size: 1rem; margin-bottom: 12px; }
a { color: var(--blue); text-decoration: none; }
.nav { margin-bottom: 16px; font-size: .85rem; display: flex; gap: 16px; }
.loading { text-align: center; padding: 40px; color: var(--text2); }

/* Accuracy banner */
.accuracy-banner { display: flex; gap: 16px; flex-wrap: wrap; }
.acc-stat { flex: 1; min-width: 100px; text-align: center; padding: 12px; background: #0f172a; border-radius: 8px; }
.acc-stat .val { font-size: 1.6rem; font-weight: 700; }
.acc-stat .lbl { font-size: .7rem; color: var(--text2); margin-top: 2px; }
.acc-good { color: var(--green); }
.acc-warn { color: var(--amber); }
.acc-bad { color: var(--red); }

/* Controls */
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.controls select, .controls button { background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px; font-size: .85rem; cursor: pointer; }
.controls button:hover { background: var(--border); }
.controls button.active { background: var(--blue); border-color: var(--blue); }

/* Timeline */
.timeline { position: relative; }
.day-group { margin-bottom: 16px; }
.day-header { font-size: .85rem; font-weight: 600; color: var(--text2); margin-bottom: 8px;
              padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.event-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1e293b;
             align-items: flex-start; }
.event-row:last-child { border-bottom: none; }
.zone-col { width: 140px; flex-shrink: 0; }
.zone-col .name { font-weight: 600; font-size: .9rem; }
.zone-col .type { font-size: .7rem; color: var(--text2); }
.forecast-col, .actual-col { flex: 1; min-width: 0; }
.col-header { font-size: .65rem; text-transform: uppercase; letter-spacing: .05em;
              color: var(--text2); margin-bottom: 4px; }
.forecast-col .detail, .actual-col .detail { font-size: .85rem; }
.forecast-col .detail { color: var(--purple); }
.outcome-col { width: 90px; flex-shrink: 0; text-align: center; }
.badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: .75rem; font-weight: 600; }
.badge-correct_water { background: rgba(34,197,94,.15); color: var(--green); }
.badge-correct_skip { background: rgba(34,197,94,.15); color: var(--green); }
.badge-false_skip { background: rgba(239,68,68,.15); color: var(--red); }
.badge-missed_skip { background: rgba(245,158,11,.15); color: var(--amber); }
.badge-no_event { background: rgba(148,163,184,.1); color: var(--text2); }
.badge-other { background: rgba(148,163,184,.1); color: var(--text2); }

/* Empty state */
.empty { text-align: center; padding: 40px; color: var(--text2); }
.empty .icon { font-size: 2rem; margin-bottom: 8px; }
.seed-btn { margin-top: 12px; padding: 8px 20px; background: var(--blue); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; }
.seed-btn:hover { opacity: .9; }

/* Mobile */
@media (max-width: 640px) {
  .event-row { flex-direction: column; gap: 6px; }
  .zone-col { width: auto; }
  .outcome-col { width: auto; text-align: left; }
  .accuracy-banner { flex-direction: column; }
}
</style>
</head>
<body>
<div class="nav">
  <a href="/">← Dashboard</a>
  <a href="/forecast">Forecast</a>
</div>
<h1>📊 Forecast vs Actual</h1>
<div class="sub">Did the system water when it predicted it would?</div>

<div class="controls">
  <select id="dayRange" onchange="load()">
    <option value="7">Last 7 days</option>
    <option value="14">Last 14 days</option>
    <option value="30" selected>Last 30 days</option>
    <option value="90">Last 90 days</option>
  </select>
  <select id="zoneFilter" onchange="applyFilter()">
    <option value="all">All zones</option>
  </select>
  <select id="outcomeFilter" onchange="applyFilter()">
    <option value="all">All outcomes</option>
    <option value="correct_water">✅ Correct water</option>
    <option value="correct_skip">✅ Correct skip</option>
    <option value="false_skip">❌ False skip</option>
    <option value="missed_skip">⚠️ Missed skip</option>
    <option value="no_event">— No event</option>
  </select>
</div>

<div id="content"><div class="loading">Loading...</div></div>

<script>
let rawData = null;

async function load() {
  const days = document.getElementById('dayRange').value;
  try {
    const r = await fetch('/api/forecast-vs-actual?days=' + days);
    if (r.status === 401) { window.location.href = '/login'; return; }
    rawData = await r.json();
    populateZoneFilter(rawData.comparisons);
    applyFilter();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="card">Error: ' + e.message + '</div>';
  }
}

function populateZoneFilter(comparisons) {
  const sel = document.getElementById('zoneFilter');
  const current = sel.value;
  const zones = new Map();
  comparisons.forEach(c => { if (!zones.has(c.zone_id)) zones.set(c.zone_id, c.zone_name); });
  sel.innerHTML = '<option value="all">All zones</option>';
  zones.forEach((name, id) => {
    sel.innerHTML += '<option value="' + id + '">' + name + '</option>';
  });
  sel.value = current;
}

function applyFilter() {
  if (!rawData) return;
  const zoneVal = document.getElementById('zoneFilter').value;
  const outcomeVal = document.getElementById('outcomeFilter').value;
  let filtered = rawData.comparisons;
  if (zoneVal !== 'all') filtered = filtered.filter(c => c.zone_id == zoneVal);
  if (outcomeVal !== 'all') filtered = filtered.filter(c => c.outcome === outcomeVal);
  render(rawData.accuracy, filtered);
}

function render(accuracy, comparisons) {
  let html = '';

  // Accuracy banner
  if (accuracy && accuracy.total > 0) {
    const accPct = accuracy.accuracy_pct;
    const accClass = accPct >= 80 ? 'acc-good' : accPct >= 60 ? 'acc-warn' : 'acc-bad';
    html += '<div class="card"><h2>Accuracy Summary</h2><div class="accuracy-banner">';
    html += accStat(accPct !== null ? accPct + '%' : '—', 'Accuracy', accClass);
    html += accStat(accuracy.total, 'Predictions');
    html += accStat(accuracy.total_waterings, 'Waterings', 'acc-good');
    html += accStat(accuracy.total_skips, 'Skips', '');
    html += accStat(accuracy.false_skips, 'False Skips', accuracy.false_skips > 0 ? 'acc-bad' : '');
    html += accStat(accuracy.missed_skips, 'Missed Skips', accuracy.missed_skips > 0 ? 'acc-warn' : '');
    html += '</div></div>';
  }

  if (!comparisons || comparisons.length === 0) {
    html += '<div class="card empty">';
    html += '<div class="icon">📊</div>';
    html += '<div>No forecast data yet.</div>';
    html += '<div style="color:var(--text2);font-size:.85rem;margin-top:8px">';
    html += 'Forecasts are captured daily at 3:55 AM before the watering window.<br>';
    html += 'You can take a manual snapshot now to start collecting data.</div>';
    html += '<button class="seed-btn" onclick="seedSnapshot()">Take Snapshot Now</button>';
    html += '</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Group by date
  const byDate = {};
  comparisons.forEach(c => {
    if (!byDate[c.forecast_date]) byDate[c.forecast_date] = [];
    byDate[c.forecast_date].push(c);
  });

  const dates = Object.keys(byDate).sort().reverse();
  html += '<div class="timeline">';
  dates.forEach(d => {
    const dayLabel = formatDate(d);
    html += '<div class="day-group">';
    html += '<div class="day-header">' + dayLabel + '</div>';
    byDate[d].forEach(c => {
      html += renderRow(c);
    });
    html += '</div>';
  });
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function renderRow(c) {
  let html = '<div class="event-row">';

  // Zone
  html += '<div class="zone-col">';
  html += '<div class="name">' + esc(c.zone_name) + '</div>';
  html += '</div>';

  // Forecast
  html += '<div class="forecast-col">';
  html += '<div class="col-header">Predicted</div>';
  html += '<div class="detail">';
  if (c.predicted_skip) {
    html += '⏭️ Skip' + (c.predicted_skip_reason ? ' (' + esc(c.predicted_skip_reason) + ')' : '');
  } else if (c.predicted_days !== null) {
    if (c.predicted_days <= 0) {
      html += '💧 Water today';
    } else {
      html += '⏳ ' + c.predicted_days.toFixed(0) + 'd until water';
      if (c.predicted_date) html += ' (' + formatDate(c.predicted_date) + ')';
    }
  } else {
    html += '— No ET demand';
  }
  html += '</div>';
  html += '<div style="font-size:.75rem;color:var(--text2)">Balance: ' +
          (c.balance_mm !== null ? c.balance_mm.toFixed(1) : '?') + '/' +
          (c.taw_mm !== null ? c.taw_mm.toFixed(1) : '?') + 'mm · ' +
          'ET: ' + (c.etc_mm !== null ? c.etc_mm.toFixed(1) : '?') + 'mm' +
          (c.rain_forecast_mm > 0 ? ' · Rain fcst: ' + c.rain_forecast_mm.toFixed(1) + 'mm' : '') +
          '</div>';
  html += '</div>';

  // Actual
  html += '<div class="actual-col">';
  html += '<div class="col-header">Actual</div>';
  html += '<div class="detail">';
  if (c.actually_watered) {
    const mins = c.actual_duration_sec ? (c.actual_duration_sec / 60).toFixed(0) : '?';
    const gal = c.actual_gallons ? c.actual_gallons.toFixed(1) : null;
    html += '💧 Watered ' + mins + ' min';
    if (gal) html += ' (' + gal + ' gal)';
    if (c.actual_trigger) html += ' — ' + esc(c.actual_trigger);
  } else if (c.actually_skipped) {
    html += '⏭️ Skipped: ' + esc(c.actual_skip_reason || 'unknown');
    if (c.actual_gallons_saved) html += ' (saved ' + c.actual_gallons_saved.toFixed(1) + ' gal)';
  } else {
    html += '<span style="color:var(--text2)">No watering or skip event</span>';
  }
  html += '</div>';
  if (c.actually_watered && c.actual_soil_before !== null) {
    html += '<div style="font-size:.75rem;color:var(--text2)">Soil: ' +
            (c.actual_soil_before !== null ? c.actual_soil_before + '%' : '?') + ' → ' +
            (c.actual_soil_after !== null ? c.actual_soil_after + '%' : '?') + '</div>';
  }
  html += '</div>';

  // Outcome badge
  html += '<div class="outcome-col">';
  html += '<span class="badge badge-' + c.outcome + '">' + outcomeLabel(c.outcome) + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}

function outcomeLabel(o) {
  const labels = {
    correct_water: '✅ Correct',
    correct_skip: '✅ Correct',
    false_skip: '❌ False Skip',
    missed_skip: '⚠️ Missed',
    no_event: '— None',
    other: '? Other',
  };
  return labels[o] || o;
}

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function accStat(val, label, cls) {
  return '<div class="acc-stat"><div class="val ' + (cls || '') + '">' + val + '</div>' +
         '<div class="lbl">' + label + '</div></div>';
}

async function seedSnapshot() {
  const btn = document.querySelector('.seed-btn');
  btn.textContent = 'Saving...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/forecast-snapshot', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✅ Saved — reloading...';
      setTimeout(load, 1000);
    } else {
      btn.textContent = 'Error: ' + (d.error || 'unknown');
      setTimeout(() => { btn.textContent = 'Take Snapshot Now'; btn.disabled = false; }, 3000);
    }
  } catch(e) {
    btn.textContent = 'Error: ' + e.message;
    setTimeout(() => { btn.textContent = 'Take Snapshot Now'; btn.disabled = false; }, 3000);
  }
}

load();
setInterval(load, 300000);
</script>
</body>
</html>
