<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Garden - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #0f172a; color: #e2e8f0; display: flex; justify-content: center;
               align-items: center; min-height: 100vh; }
        .card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 380px;
                width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #22c55e; }
        .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
        .google-btn { margin: 20px auto; display: flex; justify-content: center; }
        .hint { color: #94a3b8; font-size: 0.8rem; margin-top: 10px; display: none; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 12px; display: none; }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
    <div class="card">
        <h1>🌱 Smart Garden</h1>
        <div class="sub">Sign in with Google to continue</div>
        <div class="google-btn">
            <div id="googleSigninBtn"></div>
        </div>
        <div class="hint" id="modeHint"></div>
        <div class="error" id="error" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const qpMode = new URLSearchParams(window.location.search).get('mode');
        // Default to popup mode (no redirect URI registration required for GIS
        // callback flow). Use ?mode=redirect only when OAuth redirect URIs are
        // explicitly configured in Google Cloud Console.
        const useRedirectMode = qpMode === 'redirect';
        let gisInitialized = false;

        function showError(message) {
            const el = document.getElementById('error');
            el.style.display = 'block';
            el.textContent = message;
        }

        function showModeHint() {
            if (!useRedirectMode) return;
            const el = document.getElementById('modeHint');
            el.style.display = 'block';
            el.textContent = 'Embedded browser detected: using redirect sign-in (no popup).';
        }

        function initGoogle(clientId) {
            if (gisInitialized || !clientId) return;
            const nextPath = {{ next_path|tojson }};
            const loginUri = `${window.location.origin}/auth/google`;
            if (window.google && google.accounts && clientId) {
                google.accounts.id.initialize({
                    client_id: clientId,
                    callback: onGoogleSignIn,
                    ux_mode: useRedirectMode ? 'redirect' : 'popup',
                    login_uri: loginUri,
                    auto_select: false
                });
                google.accounts.id.renderButton(
                    document.getElementById('googleSigninBtn'),
                    { theme: 'filled_black', size: 'large', text: 'sign_in_with' }
                );
                gisInitialized = true;
            }
            showModeHint();
        }

        // Fetch client ID from server
        fetch('/auth/config')
            .then(r => r.json())
            .then(cfg => {
                const clientId = cfg.client_id;
                initGoogle(clientId);
                if (!gisInitialized) {
                    let tries = 0;
                    const timer = setInterval(() => {
                        tries += 1;
                        initGoogle(clientId);
                        if (gisInitialized || tries >= 50) {
                            clearInterval(timer);
                            if (!gisInitialized) {
                                showError('Google Sign-In did not load. Refresh and try again.');
                            }
                        }
                    }, 100);
                }
            })
            .catch(() => showError('Unable to load sign-in configuration'));

        const qp = new URLSearchParams(window.location.search);
        const err = qp.get('error');
        if (err === 'invalid_token') showError('Sign-in token was invalid. Please try again.');
        if (err === 'not_authorized') showError('This Google account is not authorized.');
        if (err === 'csrf') showError('Sign-in security check failed. Please retry.');

        function onGoogleSignIn(response) {
            fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential, next: nextPath })
            }).then(r => r.json()).then(data => {
                if (data.ok) {
                    window.location.href = data.next || '/';
                } else {
                    showError(data.error || 'Not authorized');
                }
            }).catch(err => {
                showError('Sign-in failed');
            });
        }
    </script>
</body>
</html>
